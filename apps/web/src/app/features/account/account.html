<div class="w-full min-h-screen bg-[#F5F4F3] flex justify-center pt-8">
  <div class="w-130">
    <!-- Title -->
    <h1 class="text-xl font-semibold text-black mb-2">My information</h1>

    <!-- Card -->
    <div class="bg-white rounded-3xl p-4 shadow-sm">
      <!-- avatar url -->
      <div class="mb-1">
        <p class="text-sm mb-1">Profile image</p>

        <div class="flex items-center gap-4">
          <div
            class="w-16 h-16 bg-gray-300 rounded-full overflow-hidden cursor-pointer border border-gray-300"
            (click)="fileInput.click()"
          >
            <img
              [src]="avatarUrl ? avatarUrl : 'images/user.png'"
              alt="Profile"
              class="rounded-full object-cover w-full h-full"
            />
          </div>
          <input
            type="file"
            #fileInput
            class="hidden"
            accept="image/*"
            (change)="onFileSelected($event)"
          />
        </div>
      </div>

      <!-- Name Field -->
      <div class="mb-2">
        <label class="block text-sm text-gray-500 mb-1"> Name </label>

        <input
          type="text"
          placeholder="Enter your name"
          [(ngModel)]="name"

          
          class="w-full h-10 px-4 rounded-xl text-sm bg-gray-100 text-gray-700 placeholder-gray-400 outline-none focus:ring-2 focus:ring-blue-300"
        />
      </div>

      <!-- Email Field -->
      <div class="mb-2">
        <label class="block text-sm text-gray-500 mb-1"> Username </label>

        <input
          type="text"
          placeholder="Enter your username"
          [(ngModel)]="username"

          class="w-full h-10 px-4 rounded-xl bg-gray-100 text-black outline-none text-sm focus:ring-2 focus:ring-blue-300"
        />
      </div>
      <!-- bio -->
      <div>
        <label class="block text-sm text-gray-500 mb-1">Bio</label>
        <textarea
          rows="3"
          [(ngModel)]="bio"
          placeholder="Write something about yourself..."
          class="w-full px-4 py-3 rounded-xl border text-sm bg-gray-100 border-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-300 focus:border-blue-300 resize-none transition"
        ></textarea>
      </div>

      <!-- Button -->
      <button
        (click)="saveProfile()"
        class="w-full h-10 rounded-full bg-blue-600 text-white font-medium text-sm hover:opacity-90 transition"
      >
        Save details
      </button>
    </div>

    <!-- delete title -->
    <h1 class="text-xl font-semibold text-black mb-2 pt-3">Delete Account</h1>

    <!-- Card -->
    <div class="bg-white rounded-3xl p-4 shadow-sm">
      <p class="font-semibold text-sm mb-2">Manage account deletion</p>
      <p class="text-xs mb-2">Permanently delete your entire account and all profiles you own.</p>
      <!-- Button -->
      <button
        class="w-full h-10 rounded-full bg-red-500 text-white font-medium text-sm hover:opacity-90 transition"
      >
        Delete Account
      </button>
    </div>
  </div>
</div>
