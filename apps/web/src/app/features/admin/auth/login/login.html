<div class="flex h-screen w-full overflow-hidden">
  <!-- Left: security illustration (same centering as right section) -->
  <div class="flex h-screen flex-1 min-w-0 items-center justify-center bg-gray-50">
    <div class="flex items-center justify-center h-full">
      <img
        src="images/admin-login2.png"
        alt="Security and login illustration"
        class="h-[90vh] max-w-[95%] object-contain scale-125 -translate-y-14"
      />
    </div>
  </div>

  <!-- Right: login form -->
  <div
    class="flex h-screen flex-1 min-w-0 items-center justify-center bg-white pl-6 pr-8 overflow-hidden"
  >
    <form [formGroup]="loginForm" (ngSubmit)="handleLogin()" class="flex flex-col w-full max-w-sm">
      <!-- <div class="border-t-2 border-blue-600 w-12 mb-2"></div> -->
      <h1 class="text-2xl mb-8 w-full text-center">
        <span class="font-semibold text-gray-900">Login as a </span>
        <span class="font-semibold text-gray-900">Admin User</span>
      </h1>

      <div class="relative mb-4">
        <input
          type="email"
          placeholder="Email"
          formControlName="email"
          class="w-full px-4 py-3 pr-11 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-black-600 focus:border-black-600 text-gray-900"
        />
        <lucide-icon
          name="user"
          class="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 pointer-events-none"
        ></lucide-icon>
      </div>

      <div class="relative mb-6">
        <input
          type="password"
          placeholder="Password"
          formControlName="password"
          class="w-full px-4 py-3 pr-11 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-black-600 focus:border-black-600 text-gray-900"
        />
        <lucide-icon
          name="lock"
          class="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 pointer-events-none"
        ></lucide-icon>
      </div>

      <button
        type="submit"
        class="w-full py-3 rounded-2xl font-bold text-white uppercase tracking-wide bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:ring-offset-2 transition"
      >
        Login
      </button>
    </form>
  </div>
</div>
