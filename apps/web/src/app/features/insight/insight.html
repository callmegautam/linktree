<div class="w-full min-h-screen bg-gray-100 flex justify-center pt-12">
  <div class="w-full max-w-200">
    <!-- Title -->
    <h2 class="text-lg font-semibold text-gray-800 mb-4">Lifetime totals</h2>

    <!-- Cards -->
    <div class="flex gap-6">
      <div
        *ngFor="let stat of stats"
        class="w-40 h-25 bg-white rounded-2xl px-4 py-2 shadow-sm border border-gray-200"
      >
        <!-- Icon -->
        <div class="mb-2 text-gray-500">
          <lucide-icon [name]="stat.icon" class="w-4 h-4"></lucide-icon>
        </div>

        <!-- Value -->
        <div class="text-xl font-semibold text-gray-900">
          {{ stat.value }}
        </div>

        <!-- Label -->
        <div class="text-sm text-gray-500 mt-1">
          {{ stat.label }}
        </div>
      </div>
    </div>
  </div>
</div>
