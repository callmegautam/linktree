<div class="w-full min-h-screen bg-[#F5F4F3] pt-10 px-6 flex justify-center">
  <div class="flex flex-col w-full max-w-3xl">
    <!-- Title -->
    <h1 class="text-xl font-semibold text-gray-900 mb-3 pl-10">Lifetime totals</h1>

    <!-- Cards container -->
    <div class="flex flex-wrap justify-center gap-6">
      <div
        *ngFor="let stat of stats"
        class="w-55 h-30 bg-white rounded-2xl p-5 shadow-[0_2px_8px_rgba(0,0,0,0.05)] border border-gray-100 flex flex-col justify-between"
      >
        <!-- Icon -->
        <div class="text-gray-500">
          <lucide-icon [name]="stat.icon" class="w-4 h-4"></lucide-icon>
        </div>

        <!-- Value -->
        <div class="text-2xl font-semibold text-gray-900">
          {{ stat.value }}
        </div>

        <!-- Label -->
        <div class="text-sm text-gray-500">
          {{ stat.label }}
        </div>
      </div>
    </div>
  </div>
</div>
