<div class="flex h-screen w-screen">
  <!-- login form -->
  <div class="flex flex-col h-screen w-[50%] bg-white">
    <div class="p-8">
      <h1 class="text-4xl font-bold">Linktree</h1>
    </div>

    <!-- main form -->
    <form
      [formGroup]="usernameForm"
      (ngSubmit)="handleUsername()"
      class="flex flex-1 pt-6 justify-center px-4"
    >
      <div class="w-full max-w-md text-center">
        <h2 class="text-4xl font-extrabold mb-2">Welcome to Linktree</h2>
        <p class="text-gray-600 text-sm mb-8">
          Choose your Linktree username. You can always change it later
        </p>

        <input
          type="text"
          placeholder="Username"
          formControlName="username"
          class="w-full px-4 py-3 rounded-xl bg-gray-100 focus:outline-none focus:ring-2 focus:ring-black mb-8"
        />

        <p class="text-gray-600 text-xs mb-6">
          By continuing, you agree to receive offers, news and updates from <br />Linktree
        </p>

        <button
          class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:opacity-90 transition mb-6"
        >
          Continue
        </button>
      </div>
    </form>
  </div>

  <!-- image -->
  <div class="flex h-screen w-[50%]">
    <img src="images/register.jpg" alt="" class="w-full h-full" />
  </div>
</div>
