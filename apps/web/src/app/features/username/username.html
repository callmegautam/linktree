<div class="flex h-screen w-screen">
  <!-- login form -->
  <div class="flex flex-col h-screen w-[50%] bg-white">
    <div class="p-8">
      <h1 class="text-4xl font-bold">Linktree</h1>
    </div>

    <!-- main form -->
    <form
      [formGroup]="usernameForm"
      (ngSubmit)="handleUsername()"
      class="flex flex-1 pt-6 justify-center px-4"
    >
      <div class="w-full max-w-md text-center">
        <h2 class="text-4xl font-extrabold mb-2">Welcome to Linktree</h2>
        <p class="text-gray-600 text-sm mb-8">
          Choose your Linktree username. You can always change it later
        </p>

        <div class="w-full mb-6">
          <div
            class="flex items-center bg-gray-100 rounded-xl px-4 py-3 focus-within:ring-2 focus-within:ring-black"
          >
            <span class="text-gray-500 select-none"> linktr.ee/ </span>

            <input
              type="text"
              formControlName="username"
              placeholder="username"
              class="flex-1 bg-transparent outline-none ml-1"
            />
          </div>
        </div>

        <p class="text-gray-600 text-xs mb-6">
          By continuing, you agree to receive offers, news and updates from <br />Linktree
        </p>

        <button
          type="submit"
          [disabled]="usernameForm.invalid"
          class="w-full py-3 rounded-xl font-semibold mb-6 bg-blue-600 text-white hover:opacity-90 disabled:bg-gray-300 disabled:text-gray-500 disabled:cursor-not-allowed disabled:hover:opacity-100 transition"
        >
          Continue
        </button>
      </div>
    </form>
  </div>

  <!-- image -->
  <div class="flex h-screen w-[50%]">
    <img src="images/register.jpg" alt="" class="w-full h-full" />
  </div>
</div>
