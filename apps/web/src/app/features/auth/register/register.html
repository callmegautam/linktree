<div class="flex h-screen w-screen">
  <!-- login form -->
  <div class="flex flex-col h-screen w-[50%] bg-white">
    <div class="p-8">
      <h1 class="text-4xl font-bold">Linktree</h1>
    </div>

    <!-- main form -->
    <form
      [formGroup]="registerForm"
      (ngSubmit)="handleRegister()"
      class="flex flex-1 pt-3 justify-center px-4"
    >
      <div class="w-full max-w-md text-center">
        <h2 class="text-4xl font-extrabold mb-2">Join Linktree</h2>
        <p class="text-gray-600 mb-6">Sign up for free!</p>

        <input
          type="text"
          placeholder="Name"
          formControlName="name"
          class="w-full px-4 py-3 rounded-xl bg-gray-100 focus:outline-none focus:ring-2 focus:ring-black mb-6"
        />

        <input
          type="text"
          placeholder="Username"
          formControlName="username"
          class="w-full px-4 py-3 rounded-xl bg-gray-100 focus:outline-none focus:ring-2 focus:ring-black mb-6"
        />

        <input
          type="text"
          placeholder="Email"
          formControlName="email"
          class="w-full px-4 py-3 rounded-xl bg-gray-100 focus:outline-none focus:ring-2 focus:ring-black mb-6"
        />

        <input
          type="text"
          placeholder="Password"
          formControlName="password"
          class="w-full px-4 py-3 rounded-xl bg-gray-100 focus:outline-none focus:ring-2 focus:ring-black mb-6"
        />

        <button
          class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:opacity-90 transition mb-6"
        >
          Continue
        </button>

        <div class="text-gray-500 mb-5">OR</div>

        <button
          class="w-full border border-gray-300 bg-white py-3 rounded-xl font-medium flex items-center justify-center gap-3 hover:bg-gray-50 transition mb-4"
        >
          <img
            src="https://www.svgrepo.com/show/475656/google-color.svg"
            class="w-5 h-5"
            alt="Google"
          />
          Continue with Google
        </button>

        <div class="mt-6 text-sm">
          Already have an account?
          <a [routerLink]="['/login']" class="text-blue-500 hover:underline">Log in</a>
        </div>
      </div>
    </form>
  </div>

  <!-- image -->
  <div class="flex h-screen w-[50%]">
    <img src="images/register.jpg" alt="" class="w-full h-full" />
  </div>
</div>
