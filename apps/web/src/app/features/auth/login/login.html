<div class="flex h-screen w-screen">
  <!-- login form -->
  <div class="flex flex-col h-screen w-[50%] bg-white">
    <div class="flex flex-row items-center p-8">
      <h1 class="text-3xl font-bold">Linktree</h1>
      <img src="/images/greenlogo.png" class="h-8 w-8" alt="" />
    </div>

    <!-- main form -->
    <form
      [formGroup]="loginForm"
      (ngSubmit)="handleLogin()"
      class="flex flex-1 pt-6 justify-center px-4"
    >
      <div class="flex flex-col items-center w-full max-w-md text-center pt-10">
        <h2 class="text-2xl font-extrabold mb-4">Welcome back</h2>
        <p class="text-gray-600 mb-6 text-sm">Log in to your Linktree</p>
        <input
          type="text"
          placeholder="Email"
          formControlName="email"
          class="w-95 px-4 py-2 text-sm rounded-xl bg-gray-100 focus:outline-none focus:ring-2 focus:ring-black mb-3"
        />

        <input
          type="text"
          placeholder="Password"
          formControlName="password"
          class="w-95 px-4 py-2 text-sm rounded-xl bg-gray-100 focus:outline-none focus:ring-2 focus:ring-black mb-3"
        />

        <button
          class="w-95 bg-blue-600 text-white py-2 rounded-xl font-semibold hover:opacity-90 transition mb-4"
        >
          Continue
        </button>

        <div class="text-gray-500 mb-4 text-sm">OR</div>

        <div class="flex justify-center">
          <button
            class="w-95 border border-gray-300 bg-white py-2 rounded-xl text-sm font-semibold flex items-center justify-center gap-3 hover:bg-gray-50 transition mb-3"
          >
            <img
              src="https://www.svgrepo.com/show/475656/google-color.svg"
              class="w-4 h-4"
              alt="Google"
            />
            Continue with Google
          </button>
        </div>

        <div class="mt-3 text-xs text-blue-400">
          <a href="" class="hover:underline">Forgot password?</a>
        </div>

        <div class="mt-3 text-xs">
          Don't have an account?
          <a [routerLink]="['/register']" class="text-blue-500 hover:underline">Sign up</a>
        </div>
      </div>
    </form>
  </div>

  <!-- image -->
  <div class="flex h-screen w-[50%]">
    <img src="images/login.png" alt="" class="w-full h-full" />
  </div>
</div>
