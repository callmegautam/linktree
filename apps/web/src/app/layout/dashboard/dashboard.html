<div class="flex h-screen w-screen overflow-hidden bg-[#FBFAF9]">
  <!-- main side bar -->
  <div class="h-full bg-[#F1F0EE] w-16 flex flex-col justify-between">
    <!-- Top Section -->
    <div class="flex flex-col items-center mt-4 space-y-6">
      <!-- Profile / Logo -->
      <div class="flex items-center justify-center">
        <button class="w-8 h-8 bg-white rounded-full flex items-center justify-center">
          <img src="/images/blacklogo.png" class="w-4 h-4" alt="Logo" />
        </button>
      </div>

      <!-- Navigation Links -->
      <div class="flex flex-col items-center justify-center space-y-2 w-full mt-45">
        <a
          [routerLink]="['/dashboard/links']"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex flex-col items-center justify-center py-2 rounded-2xl w-full"
        >
          <lucide-icon name="gallery-vertical-end" class="w-5 h-5 text-gray-700"></lucide-icon>
          <span class="text-xs font-medium">Links</span>
        </a>

        <a
          [routerLink]="['/dashboard/design']"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex flex-col items-center justify-center py-2 rounded-2xl w-full"
        >
          <lucide-icon name="pencil" class="w-5 h-5 text-gray-700"></lucide-icon>
          <span class="text-xs font-medium">Design</span>
        </a>

        <a
          [routerLink]="['/dashboard/account']"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex flex-col items-center justify-center py-2 rounded-2xl w-full"
        >
          <lucide-icon name="settings" class="w-5 h-5 text-gray-700"></lucide-icon>
          <span class="text-xs font-medium">Account</span>
        </a>
      </div>
    </div>

    <!-- Logout -->
    <div class="flex justify-center mb-4">
      <button
        (click)="logout()"
        class="flex flex-col items-center justify-center space-y-1 px-4 py-2 text-red-500 hover:bg-gray-100 rounded-2xl transition w-full"
      >
        <lucide-icon name="log-out" class="w-5 h-5"></lucide-icon>
        <span class="text-xs font-medium">Logout</span>
      </button>
    </div>
  </div>

  <!-- main content -->
  <div
    class="flex h-full w-[60%]"
    [class.w-[63%]]="showRightSidebar"
    [class.w-[87%]]="!showRightSidebar"
  >
    <div class="w-full h-[96%] mt-4">
      <router-outlet></router-outlet>
    </div>
  </div>

  <!-- side bar -->
  <div
    *ngIf="showRightSidebar"
    class="flex flex-col items-center h-full w-[40%] border-l border-gray-300 gap-5"
  >
    <div class="h-[10%] w-full flex items-center justify-center">
      <div
        class="bg-white rounded-2xl w-80 h-[50%] text-sm flex items-center justify-center shadow-sm gap-3"
      >
        <span class="text-gray-700 font-semibold"> linktree/{{ username }} </span>
        <button (click)="openLinkInTab(username)" class="text-gray-800 hover:text-black transition">
          <lucide-icon name="upload" size="15"></lucide-icon>
        </button>
      </div>
    </div>
    <div class="flex justify-center h-[90%] w-full">
      <div
        class="w-80 h-160 rounded-3xl shadow-xl flex flex-col p-6"
        [ngClass]="selectedFont"
        [ngStyle]="{
          background: theme?.background?.value || '#000000',
          'background-color': theme?.text?.pageColor || '#EFF1F3',
        }"
      >
        <!-- Top icon -->
        <div class="self-start">
          <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center">
            <img src="/images/blacklogo.png" class="w-4 h-4" alt="Logo" />
          </div>
        </div>

        <!-- Profile picture -->
        <div class="flex flex-col items-center mt-10 gap-3 mb-5">
          <div class="w-20 h-20 rounded-full border border-gray-300 overflow-hidden">
            <img
              [src]="avatarUrl ? avatarUrl : 'images/user.png'"
              alt="Profile"
              class="w-20 h-20 rounded-full object-cover"
            />
          </div>
          <span
            class="text-lg font-semibold"
            [ngStyle]="{
              color: theme?.text?.titleColor || '#374151',
            }"
          >
            {{ name }}
          </span>
        </div>

        <!-- Links -->
        <div class="w-full p-2 flex flex-wrap gap-4 justify-center">
          <ng-container *ngFor="let link of links">
            <div class="relative group">
              <a
                [href]="link.link"
                target="_blank"
                class="w-9 h-9 bg-white rounded-full shadow-md flex items-center justify-center overflow-hidden transition duration-300"
              >
                <!-- Show image if provided -->
                <img
                  *ngIf="link.icon"
                  [src]="link.icon"
                  alt="{{ link.platform }}"
                  class="w-full h-full object-cover"
                />
              </a>

              <!-- Tooltip -->
              <div
                class="absolute top-full bg-gray-800 text-white mt-2 left-1/2 transform -translate-x-1/2 text-xs rounded py-1 px-2 opacity-0 group-hover:opacity-100 transition-opacity duration-200 pointer-events-none"
              >
                {{ link.title | titlecase }}
              </div>
            </div>
          </ng-container>
        </div>

        <!-- Create Button always at bottom -->
        <div class="mt-auto w-full flex justify-center mb-3">
          <button
            class="w-auto text-sm font-semibold px-10 py-3 shadow-md"
            [ngStyle]="{
              'background-color': theme?.button?.color || '#FFFFFF',
              color: theme?.button?.textColor || '#000000',
            }"
            [ngClass]="{ 'rounded-full': theme?.button?.radius === 'rounded' }"
          >
            Create your own Linktree
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
