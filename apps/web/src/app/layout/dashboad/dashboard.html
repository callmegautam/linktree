<div class="flex h-screen w-screen overflow-hidden bg-[#FBFAF9]">
  <!-- main side bar -->
  <div class="h-full bg-[#F1F0EE] w-[13%] flex flex-col">
    <div class="flex-1">
      <div class="flex items-center gap-2 px-3 py-3">
        <!-- icon -->
        <div class="w-8 h-8 rounded-full bg-gray-400 flex items-center justify-center">
          <img
            src="images/user.png"
            alt="Profile"
            class="w-8 h-8 rounded-full border border-gray-300 object-cover"
          />
        </div>
        <!-- username -->
        <span class="text-sm font-medium text-gray-700"> {{ userName$ | async }}</span>
      </div>

      <!-- linktree heading -->
      <div class="flex flex-row gap-2 items-center px-4 pt-5 pb-1">
        <lucide-icon name="blocks" class="w-5 h-5"></lucide-icon>
        <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide">My Linktree</h2>
      </div>

      <!-- menu button -->
      <div class="flex flex-col p-2 text-sm">
        <a
          [routerLink]="['/dashboard/links']"
          class="flex items-center space-x-3 px-4 py-2 rounded-2xl hover:bg-gray-300 transition-colors"
        >
          <lucide-icon name="link" class="w-4 h-4 text-gray-700"></lucide-icon>
          <span class="text-gray-700 font-medium">Links</span>
        </a>

        <a
          [routerLink]="['/dashboard/design']"
          class="flex items-center space-x-3 px-4 py-2 rounded-2xl hover:bg-gray-300 transition-colors"
        >
          <lucide-icon name="pencil" class="w-4 h-4 text-gray-700"></lucide-icon>
          <span class="text-gray-700 font-medium">Design</span>
        </a>

        <a
          [routerLink]="['/dashboard/insight']"
          class="flex items-center space-x-3 px-4 py-2 rounded-2xl hover:bg-gray-300 transition-colors cursor-pointer"
        >
          <lucide-icon name="chart-line" class="w-4 h-4 text-gray-700"></lucide-icon>
          <span class="text-gray-700 font-medium">Insights</span>
        </a>

        <a
          [routerLink]="['/dashboard/account']"
          class="flex items-center space-x-3 px-4 py-2 rounded-2xl hover:bg-gray-300 transition-colors cursor-pointer"
        >
          <lucide-icon name="circle-user-round" class="w-4 h-4 text-gray-700"></lucide-icon>
          <span class="text-gray-700 font-medium">Account</span>
        </a>
      </div>
    </div>

    <!-- logout -->
    <div class="flex border-t pl-2 border-gray-300">
      <button
        class="flex items-center gap-2 w-full px-4 py-3 text-red-500 text-lg hover:bg-gray-100 transition"
      >
        Logout
        <lucide-icon name="log-out" class="w-4 h-4"></lucide-icon>
      </button>
    </div>
  </div>
  <!-- main content -->
  <div
    class="flex-1 h-full w-[60%]"
    [class.w-[63%]]="showRightSidebar"
    [class.w-[87%]]="!showRightSidebar"
  >
    <div class="h-[7%] w-full border-b border-gray-200 flex items-center justify-between px-6">
      <!-- Left: Page Name -->
      <h1 class="text-xl font-semibold text-gray-800">
        {{ pageName }}
      </h1>

      <!-- Right: Save Button -->
      <button
        *ngIf="showSave$ | async"
        class="bg-blue-600 text-white px-5 py-2 rounded-lg font-medium hover:bg-blue-700 transition"
      >
        Save Changes
      </button>
    </div>
    <div class="w-full h-[93%]">
      <router-outlet></router-outlet>
    </div>
  </div>
  <!-- side bar -->
  <div
    *ngIf="showRightSidebar"
    class="flex flex-col items-center h-full w-[24%] border-l border-gray-300"
  >
    <div class="h-[7%] w-full flex items-center px-15">
      <div
        class="bg-white rounded-2xl w-full h-[60%] text-sm font-semibold flex items-center justify-center shadow-sm"
      >
        <span class="text-gray-700 font-medium"> linktree/{{ userName$ | async }} </span>
      </div>
    </div>
    <div class="flex items-center justify-center h-[93%] w-full">
      <div class="bg-[#EFF1F3] rounded-3xl w-60 h-125 shadow-xl flex flex-col items-center p-4">
        <!-- Top icon -->
        <div class="self-start">
          <button class="w-6 h-6 bg-white rounded-full flex items-center justify-center">
            <img src="/images/blacklogo.png" class="w-3 h-3" alt="" />
          </button>
        </div>

        <!-- Profile picture -->
        <div class="flex flex-col items-center mt-8 gap-2 mb-55">
          <div class="w-16 h-16 bg-gray-400 rounded-full">
            <img
              src="images/user.png"
              alt="Profile"
              class="w-16 h-16 rounded-full border border-gray-300 object-cover"
            />
          </div>
          <span class="text-gray-700 text-sm font-semibold">@{{ userName$ | async }} </span>
        </div>

        <!-- Join button -->
        <button
          class="bg-white w-auto text-black text-xs font-semibold px-4 py-2 rounded-full shadow-md"
        >
          Join {{ userName$ | async }} on Linktree
        </button>
      </div>
    </div>
  </div>
</div>
